---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              tag: v2.7.5

    immich:
      persistence:
        library:
          existingClaim: immich-library

    valkey:
      enabled: true

    server:
      controllers:
        main:
          containers:
            main:
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: uri
      route:
        main:
          hostnames: ["immich.${SECRET_DOMAIN}"]
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      persistence:
        cache:
          type: persistentVolumeClaim
          storageClass: tns-csi-nfs
          size: 10Gi
          accessMode: ReadWriteMany
