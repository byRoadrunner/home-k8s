---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    valkey:
      enabled: true

    server:
      controllers:
        main:
          containers:
            main:
              env:
                DB_HOSTNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: host
                DB_PORT:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: port
                DB_DATABASE_NAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: dbname
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: user
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-app
                      key: password
      route:
        main:
          hostnames: ["immich.${SECRET_DOMAIN}"]
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      persistence:
        cache:
          type: persistentVolumeClaim
          storageClass: tns-csi-nfs
          size: 10Gi
          accessMode: ReadWriteMany
