---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
spec:
  interval: 1h
  chart:
    spec:
      chart: trek
      interval: 12h
      version: 2.9.13
      sourceRef:
        kind: HelmRepository
        name: trek
  values:
    env:
      ALLOWED_ORIGINS: "https://trek.${SECRET_DOMAIN}"
      APP_URL: "https://trek.${SECRET_DOMAIN}"
      TRUST_PROXY: "1"
      TZ: Europe/Berlin
    existingSecret: trek-secret
    existingSecretKey: ENCRYPTION_KEY
    persistence:
      enabled: true
      data:
        size: 10Gi
      uploads:
        size: 10Gi
  # The upstream chart does not expose storageClassName, so patch the rendered PVCs.
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: all
              spec:
                storageClassName: tns-csi-iscsi
            target:
              kind: PersistentVolumeClaim
              name: trek-(data|uploads)
